<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Simulasi User Workspace</title>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
</head>
<body style="font-family: Arial, sans-serif; padding: 30px; background-color: #f4f4f4;">

    <h2>👨‍💻 Layar Simulasi User Workspace</h2>
    <h3 id="status" style="color: red;">🔴 Menunggu koneksi ke Backend...</h3>
    
    <div style="background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
        <h4> </h4>Kotak Masuk Notifikasi:</h4>
        <ul id="daftar-notif" style="color: #2563eb; font-weight: bold; line-height: 1.8;"></ul>
    </div>

    <script>
        //  PENTING: Ganti dengan URL Ngrok milikmu yang aktif (.dev)
        const socket = io('https://bunkbed-unmixable-regulator.ngrok-free.dev', {
    extraHeaders: {
        "ngrok-skip-browser-warning": "true"
    }
});

        // Jika berhasil terhubung
        socket.on('connect', () => {
            document.getElementById('status').style.color = "green";
            document.getElementById('status').innerText = "🟢 TERHUBUNG! (ID Komputer: " + socket.id + ")";
        });

        // Menangkap pengeras suara dari backend (nama event harus persis: 'notif-workspace')
        socket.on('notif-workspace', (data) => {
            // 1. Tulis pesan ke layar
            const li = document.createElement('li');
            li.innerText = `[${new Date().toLocaleTimeString()}] ${data.judul} - ${data.pesan}`;
            document.getElementById('daftar-notif').prepend(li);
            
            // 2. Munculkan Pop-up Alert yang berisik!
            alert(` PERHATIAN WORKSPACE \n\n${data.judul}\n${data.pesan}`);
        });
    </script>

</body>
</html>
